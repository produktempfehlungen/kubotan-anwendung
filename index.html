<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f8f9fa;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #e8500a;
      --accent-hover: #f15f1b;
      --trust-bg: #dcfce7;
      --trust-text: #15803d;
      --gold: #f5b301;
      --max-width: 680px;
      --shadow: 0 18px 45px rgba(26, 26, 46, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 17px;
      line-height: 1.7;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    img,
    svg {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
    }

    p {
      margin: 0 0 1.25rem;
    }

    p:last-child {
      margin-bottom: 0;
    }

    strong {
      font-weight: 800;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1100;
      width: 0;
      height: 3px;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(232, 80, 10, 0.5);
      transition: width 0.08s linear;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .top-bar__inner {
      width: min(100% - 32px, var(--max-width));
      min-height: 66px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: 9px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand__logo {
      flex: 0 0 auto;
      line-height: 1;
    }

    .brand__name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page {
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
      padding: 36px 0 92px;
    }

    .article-header {
      padding: 24px 0 28px;
      border-bottom: 1px solid var(--border);
    }

    .label {
      display: inline-flex;
      align-items: center;
      margin-bottom: 18px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--trust-bg);
      color: var(--trust-text);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2 {
      font-family: Georgia, serif;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: -0.035em;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.15rem, 10vw, 3.7rem);
    }

    h2 {
      margin: 0 0 18px;
      font-size: clamp(1.55rem, 5vw, 2.15rem);
    }

    .lead {
      margin: 0 0 18px;
      color: #374151;
      font-size: 1.15rem;
      line-height: 1.65;
    }

    .hero-rating,
    .product-rating {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.96rem;
    }

    .stars {
      color: var(--gold);
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .author {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .author__avatar {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      line-height: 1;
    }

    .article-section {
      padding: 34px 0;
    }

    .article-section:nth-of-type(even) {
      position: relative;
    }

    .article-section:nth-of-type(even)::before {
      content: "";
      position: absolute;
      inset: 0 -12px;
      z-index: -1;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(248, 249, 250, 0.75), rgba(248, 249, 250, 0));
    }

    .copy {
      color: #26263a;
    }

    .copy ul,
    .copy ol {
      margin: 1rem 0 1.25rem;
      padding-left: 1.35rem;
    }

    .copy li {
      margin: 0.4rem 0;
    }

    .cta-block,
    .product-box,
    .review-card,
    details {
      border: 1px solid var(--border);
      background: var(--bg-soft);
      box-shadow: var(--shadow);
    }

    .cta-block {
      margin: 28px 0;
      padding: 26px;
      border-radius: 18px;
      text-align: center;
    }

    .cta-block--final {
      margin-top: 36px;
      padding: 34px 26px;
      background:
        radial-gradient(circle at top left, rgba(232, 80, 10, 0.12), transparent 34%),
        var(--bg-soft);
    }

    .btn-cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 430px;
      min-height: 58px;
      padding: 18px 32px;
      overflow: hidden;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      box-shadow: 0 14px 28px rgba(232, 80, 10, 0.28);
      color: #ffffff;
      font-size: 1.08rem;
      font-weight: 900;
      line-height: 1.2;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.015em;
      transform: translateY(0);
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .btn-cta::before {
      content: "";
      position: absolute;
      top: -35%;
      left: -45%;
      width: 32%;
      height: 170%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
      transform: rotate(20deg);
      animation: shimmer 3.2s ease-in-out infinite;
    }

    .btn-cta:hover,
    .btn-cta:focus-visible {
      background: var(--accent-hover);
      box-shadow: 0 18px 32px rgba(232, 80, 10, 0.34);
      transform: translateY(-2px);
    }

    .btn-cta--small {
      width: auto;
      max-width: none;
      min-height: 42px;
      padding: 11px 16px;
      font-size: 0.8rem;
      box-shadow: 0 9px 18px rgba(232, 80, 10, 0.2);
      white-space: nowrap;
    }

    .btn-cta--large {
      max-width: 520px;
      min-height: 66px;
      font-size: 1.15rem;
    }

    @keyframes shimmer {
      0% {
        left: -55%;
      }
      52%,
      100% {
        left: 125%;
      }
    }

    .cta-meta {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .cta-urgency {
      color: var(--accent);
    }

    .product-box {
      margin: 34px 0;
      padding: 26px;
      border-radius: 18px;
    }

    .product-box h2 {
      margin-bottom: 14px;
    }

    .benefits {
      list-style: none;
      margin: 0 0 20px;
      padding: 0;
    }

    .benefits li {
      position: relative;
      margin: 0 0 10px;
      padding-left: 30px;
      font-weight: 700;
    }

    .benefits li::before {
      content: "✓";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--trust-text);
      font-weight: 900;
    }

    .trust-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 20px 0;
    }

    .trust-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--trust-bg);
      color: var(--trust-text);
      font-weight: 800;
    }

    .reviews {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 28px 0;
    }

    .review-card {
      padding: 22px;
      border-radius: 16px;
    }

    .review-card blockquote {
      margin: 12px 0 16px;
      color: #26263a;
      font-style: italic;
    }

    .review-author {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .faq {
      display: grid;
      gap: 12px;
      padding: 26px 0;
    }

    details {
      border-radius: 14px;
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 18px 20px;
      font-weight: 900;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::after {
      content: "+";
      float: right;
      color: var(--accent);
      font-weight: 900;
    }

    details[open] summary::after {
      content: "−";
    }

    details p {
      padding: 0 20px 20px;
      color: #374151;
    }

    .footer {
      padding: 30px 0 110px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .footer p {
      margin-bottom: 16px;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
    }

    .footer-links a:hover,
    .footer-links a:focus-visible {
      color: var(--accent);
      text-decoration: underline;
    }

    .sticky-mobile-cta {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid var(--border);
      box-shadow: 0 -16px 30px rgba(26, 26, 46, 0.12);
      transform: translateY(115%);
      transition: transform 0.22s ease;
      backdrop-filter: blur(14px);
    }

    .sticky-mobile-cta.is-visible {
      transform: translateY(0);
    }

    .sticky-mobile-cta .btn-cta {
      max-width: none;
      min-height: 54px;
    }

    @media (min-width: 620px) {
      .trust-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .reviews {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 769px) {
      .page {
        padding-top: 48px;
      }

      .sticky-mobile-cta {
        display: none;
      }

      .footer {
        padding-bottom: 46px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <script src="config.js"></script>
</head>
<body>
  <div id="page-root"></div>
  <script>
    (function () {
      "use strict";

      if (typeof CONFIG === "undefined") {
        return;
      }

      var cfg = CONFIG;
      var root = document.getElementById("page-root");

      function first(value, fallback) {
        return value == null || value === "" ? fallback : value;
      }

      function textNode(value) {
        return document.createTextNode(first(value, ""));
      }

      function el(tagName, className, text) {
        var node = document.createElement(tagName);
        if (className) {
          node.className = className;
        }
        if (text != null) {
          node.textContent = text;
        }
        return node;
      }

      function setMeta(name, content, attr) {
        if (!content) {
          return;
        }
        var attribute = attr || "name";
        var selector = "meta[" + attribute + "=\"" + name + "\"]";
        var meta = document.head.querySelector(selector);
        if (!meta) {
          meta = document.createElement("meta");
          meta.setAttribute(attribute, name);
          document.head.appendChild(meta);
        }
        meta.setAttribute("content", content);
      }

      function setCanonical(url) {
        if (!url) {
          return;
        }
        var link = document.head.querySelector("link[rel=\"canonical\"]");
        if (!link) {
          link = document.createElement("link");
          link.setAttribute("rel", "canonical");
          document.head.appendChild(link);
        }
        link.setAttribute("href", url);
      }

      function setStructuredData() {
        var product = cfg.product || {};
        var schema = {
          "@context": "https://schema.org",
          "@type": "Review",
          "name": first(cfg.metaTitle, ""),
          "author": {
            "@type": "Person",
            "name": first(cfg.authorName, "")
          },
          "reviewRating": {
            "@type": "Rating",
            "ratingValue": first(product.rating, ""),
            "bestRating": "5"
          },
          "itemReviewed": {
            "@type": "Product",
            "name": first(product.name, "")
          }
        };
        var script = document.createElement("script");
        script.type = "application/ld+json";
        script.textContent = JSON.stringify(schema);
        document.head.appendChild(script);
      }

      function applyHead() {
        document.title = first(cfg.metaTitle, "");
        setMeta("description", cfg.metaDescription);
        setMeta("keywords", cfg.metaKeyword);
        setMeta("google-site-verification", cfg.googleVerification);
        setMeta("og:type", "article", "property");
        setMeta("og:title", cfg.metaTitle, "property");
        setMeta("og:description", cfg.metaDescription, "property");
        setMeta("og:image", cfg.ogImage, "property");
        setMeta("og:url", cfg.canonical, "property");
        setMeta("og:site_name", cfg.siteName, "property");
        setCanonical(cfg.canonical);
        setStructuredData();
      }

      function getCtaHref() {
        return first(cfg.cloakPath, "./go.html");
      }

      function createCta(isShort, modifier) {
        var link = el("a", "btn-cta" + (modifier ? " " + modifier : ""));
        link.href = getCtaHref();
        link.textContent = first(isShort ? cfg.ctaTextShort : cfg.ctaText, cfg.ctaText);
        link.target = "_blank";
        link.rel = "nofollow noopener";
        return link;
      }

      function starString(value) {
        var count = Number(value);
        if (!Number.isFinite(count)) {
          count = 5;
        }
        count = Math.max(0, Math.min(5, Math.round(count)));
        return "★★★★★".slice(0, count) + "☆☆☆☆☆".slice(0, 5 - count);
      }

      function createRating(product, className) {
        var rating = el("div", className || "hero-rating");
        var stars = el("span", "stars", starString(product.rating));
        var score = el("span", "", first(product.rating, "") + " / 5");
        var count = el("span", "", "(" + first(product.ratingCount, "") + ")");
        rating.append(stars, score, count);
        return rating;
      }

      function createCtaBlock(extraClass, large) {
        var block = el("section", "cta-block" + (extraClass ? " " + extraClass : ""));
        block.appendChild(createCta(false, large ? "btn-cta--large" : ""));
        if (cfg.ctaUrgency) {
          block.appendChild(el("div", "cta-meta cta-urgency", cfg.ctaUrgency));
        }
        if (cfg.ctaSubtext) {
          block.appendChild(el("div", "cta-meta", cfg.ctaSubtext));
        }
        return block;
      }

      function createTopBar() {
        var bar = el("header", "top-bar");
        var inner = el("div", "top-bar__inner");
        var brand = el("div", "brand");
        brand.append(el("span", "brand__logo", cfg.logo), el("span", "brand__name", cfg.siteName));
        inner.append(brand, createCta(true, "btn-cta--small"));
        bar.appendChild(inner);
        return bar;
      }

      function createArticleHeader() {
        var header = el("header", "article-header");
        var product = cfg.product || {};
        header.appendChild(el("div", "label", cfg.articleLabel));
        header.appendChild(el("h1", "", cfg.heroHeadline));
        header.appendChild(el("p", "lead", cfg.heroSubline));
        header.appendChild(createRating(product, "hero-rating"));

        var author = el("div", "author");
        author.append(el("span", "author__avatar", cfg.logo), el("span", "", cfg.authorName), textNode("·"), el("span", "", cfg.authorDate));
        header.appendChild(author);
        return header;
      }

      function createHtmlSection(html) {
        var section = el("section", "article-section");
        var copy = el("div", "copy");
        copy.innerHTML = first(html, "");
        section.appendChild(copy);
        return section;
      }

      function createStorySection(story) {
        var section = el("section", "article-section");
        if (story.showH2 && story.headline) {
          section.appendChild(el("h2", "", story.headline));
        }
        var copy = el("div", "copy");
        copy.innerHTML = first(story.text, "");
        section.appendChild(copy);
        return section;
      }

      function createProductBox() {
        var product = cfg.product || {};
        var box = el("section", "product-box");
        box.appendChild(el("h2", "", product.name));
        box.appendChild(createRating(product, "product-rating"));

        var list = el("ul", "benefits");
        (product.benefits || []).forEach(function (benefit) {
          list.appendChild(el("li", "", benefit));
        });
        box.appendChild(list);
        box.appendChild(createCta(false, ""));
        return box;
      }

      function createTrustBadges() {
        var section = el("section", "trust-grid");
        (cfg.trustBadges || []).forEach(function (badge) {
          var item = el("div", "trust-badge");
          item.append(el("span", "", badge.icon), el("span", "", badge.label));
          section.appendChild(item);
        });
        return section;
      }

      function createReviews() {
        var section = el("section", "reviews");
        (cfg.reviews || []).forEach(function (review) {
          var card = el("article", "review-card");
          card.appendChild(el("div", "stars", starString(review.stars)));
          card.appendChild(el("blockquote", "", review.text));
          card.appendChild(el("div", "review-author", first(review.name, "") + ", " + first(review.location, "")));
          section.appendChild(card);
        });
        return section;
      }

      function createFaq() {
        var section = el("section", "faq");
        (cfg.faqs || []).forEach(function (faq) {
          var details = el("details", "");
          details.appendChild(el("summary", "", faq.q));
          details.appendChild(el("p", "", faq.a));
          section.appendChild(details);
        });
        return section;
      }

      function createFooter() {
        var footer = el("footer", "footer");
        footer.appendChild(el("p", "", cfg.footerDisclaimer));
        var links = el("nav", "footer-links");
        (cfg.footerLinks || []).forEach(function (item) {
          var link = el("a", "", item.text);
          link.href = first(item.url, "#");
          if (/^https?:\/\//i.test(link.href)) {
            link.target = "_blank";
            link.rel = "nofollow noopener";
          }
          links.appendChild(link);
        });
        footer.appendChild(links);
        return footer;
      }

      function createStickyCta(footer) {
        var sticky = el("div", "sticky-mobile-cta");
        sticky.appendChild(createCta(true, ""));
        root.appendChild(sticky);

        var footerVisible = false;
        function update() {
          var shouldShow = window.scrollY > 300 && !footerVisible;
          sticky.classList.toggle("is-visible", shouldShow);
        }

        if ("IntersectionObserver" in window) {
          var observer = new IntersectionObserver(function (entries) {
            footerVisible = entries.some(function (entry) {
              return entry.isIntersecting;
            });
            update();
          });
          observer.observe(footer);
        }

        window.addEventListener("scroll", update, { passive: true });
        update();
      }

      function createProgressBar() {
        if (cfg.showProgressBar !== true) {
          return;
        }
        var bar = el("div", "progress-bar");
        bar.setAttribute("aria-hidden", "true");
        document.body.prepend(bar);
        function update() {
          var scrollable = document.documentElement.scrollHeight - window.innerHeight;
          var progress = scrollable > 0 ? Math.min(100, Math.max(0, window.scrollY / scrollable * 100)) : 0;
          bar.style.width = progress + "%";
        }
        window.addEventListener("scroll", update, { passive: true });
        window.addEventListener("resize", update);
        update();
      }

      function render() {
        applyHead();
        createProgressBar();

        root.appendChild(createTopBar());
        var main = el("main", "page");
        main.appendChild(createArticleHeader());
        main.appendChild(createHtmlSection(cfg.hookText));

        var stories = cfg.storySections || [];
        var insertedMidCta = false;
        stories.forEach(function (story, index) {
          main.appendChild(createStorySection(story));
          if (index === 1 || (stories.length < 2 && index === stories.length - 1)) {
            main.appendChild(createCtaBlock("", false));
            main.appendChild(createProductBox());
            insertedMidCta = true;
          }
        });

        if (!insertedMidCta) {
          main.appendChild(createCtaBlock("", false));
          main.appendChild(createProductBox());
        }

        main.appendChild(createTrustBadges());
        main.appendChild(createReviews());
        main.appendChild(createFaq());
        main.appendChild(createCtaBlock("cta-block--final", true));
        var footer = createFooter();
        main.appendChild(footer);
        root.appendChild(main);
        createStickyCta(footer);
      }

      render();
    })();
  </script>
</body>
</html>
